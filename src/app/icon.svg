<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Thread spool body -->
  <ellipse cx="32" cy="52" rx="18" ry="5" fill="none" stroke="white" stroke-width="2.5"/>
  <rect x="14" y="18" width="36" height="34" rx="2" fill="none" stroke="white" stroke-width="2.5"/>
  <ellipse cx="32" cy="18" rx="18" ry="5" fill="none" stroke="white" stroke-width="2.5"/>
  
  <!-- Thread lines on spool -->
  <line x1="15" y1="26" x2="49" y2="26" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="15" y1="32" x2="49" y2="32" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="15" y1="38" x2="49" y2="38" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="15" y1="44" x2="49" y2="44" stroke="white" stroke-width="1" opacity="0.5"/>

  <!-- Spool hole -->
  <ellipse cx="32" cy="18" rx="5" ry="2" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>

  <!-- Needle going through spool diagonally -->
  <line x1="22" y1="48" x2="46" y2="8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Needle eye -->
  <ellipse cx="46" cy="8" rx="2" ry="1.2" fill="none" stroke="white" stroke-width="1.5" transform="rotate(-30 46 8)"/>
  
  <!-- Thread from needle curving left -->
  <path d="M46 8 Q52 16, 46 22 Q38 30, 12 14 Q4 10, 8 20" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
</svg>
