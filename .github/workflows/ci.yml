name: CI — Build, Test & Security Audit

on:
  push:
    branches:
      - main
      - '**'          # runs on every branch push
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Security Audit
  # ─────────────────────────────────────────────
  security-audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on high/critical)
        id: audit
        run: |
          echo "## 🔐 Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tee audit_output.txt || AUDIT_FAILED=true
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$AUDIT_FAILED" = "true" ]; then
            echo "audit_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload audit report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit_output.txt
          retention-days: 30

      - name: Post audit summary on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit_output.txt', 'utf8');
            const body = `## 🔐 Security Audit Failed\n\nThe following vulnerabilities were found:\n\n\`\`\`\n${report.slice(0, 60000)}\n\`\`\`\n\n> ℹ️ Fix with \`npm audit fix\` or upgrade affected packages.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ─────────────────────────────────────────────
  # JOB 2: Lint, Test & Build
  # ─────────────────────────────────────────────
  build-and-test:
    name: 🛠️ Lint, Test & Build
    runs-on: ubuntu-latest
    needs: security-audit      # only runs if audit passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Run Tests
        run: npm run test -- --ci --coverage
        env:
          CI: true

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: coverage/
          retention-days: 14

      - name: Build Application
        run: npm run build

      - name: Build success summary
        if: success()
        run: |
          echo "## ✅ Pipeline Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
